    <!-- BOTPRESS AI AGENT SCRIPTS                                  -->

    <script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
    <script src="https://files.bpcontent.cloud/2026/03/06/05/20260306053259-EX10ZT53.js" defer></script>

<script>
(function() {
  'use strict';

  var bubble = document.getElementById('ptdtAiBubble');
  var closeBtn = bubble.querySelector('.ptdt-ai-bubble-close');
  var manuallyDismissed = false;

  setTimeout(function() { showBubble(); }, 3000);

  // Click OUR bubble → open chatbot
  bubble.addEventListener('click', function(e) {
    if (e.target === closeBtn) return;
    hideBubble();
    try { window.botpress.open(); } catch(err) {}
  });

  // Close ✕ → dismiss permanently
  closeBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    hideBubble();
    manuallyDismissed = true;
  });

  // Keyboard accessibility
  bubble.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      bubble.click();
    }
  });

  // GLOBAL click listener — catch clicks on the Botpress FAB
  document.addEventListener('click', function(e) {
    var target = e.target;
    // Walk up the DOM tree to check if click was on Botpress FAB
    var el = target;
    for (var i = 0; i < 10; i++) {
      if (!el) break;
      var cls = (el.className || '').toString();
      var id = (el.id || '').toString();
      if (cls.indexOf('bpFab') > -1 || id.indexOf('bp-') > -1 || cls.indexOf('bpWidget') > -1) {
        // Clicked Botpress FAB — hide our bubble
        hideBubble();
        // Wait for chat to close later, then show bubble again
        startWatchingForClose();
        return;
      }
      el = el.parentElement;
    }
  }, true); // useCapture = true to catch it before Botpress

  var closeWatcher = null;

  function startWatchingForClose() {
    // Stop any existing watcher
    if (closeWatcher) clearInterval(closeWatcher);
    
    // Give Botpress 1 second to open, then start watching
    setTimeout(function() {
      closeWatcher = setInterval(function() {
        // Check if botpress chat is still open by checking page state
        // When chat closes, the FAB becomes visible again as a small circle
        // We detect this by checking if any large overlay/panel exists
        var largePanel = false;
        var allEls = document.querySelectorAll('body > div, body > iframe');
        for (var i = 0; i < allEls.length; i++) {
          var d = allEls[i];
          if (d.id === 'root' || d.id === 'ptdtAiBubble') continue;
          var rect = d.getBoundingClientRect();
          if (rect.height > 350 && rect.width > 280 && rect.right > window.innerWidth - 50) {
            largePanel = true;
            break;
          }
        }
        
        if (!largePanel) {
          // Chat has closed!
          clearInterval(closeWatcher);
          closeWatcher = null;
          if (!manuallyDismissed) {
            showBubble();
          }
        }
      }, 500);
    }, 1000);
  }

  // Also watch when OUR bubble opens the chat
  var origClick = bubble.onclick;
  bubble.addEventListener('click', function() {
    startWatchingForClose();
  });

  function showBubble() {
    if (!manuallyDismissed) {
      bubble.style.display = 'block';
      bubble.style.animation = 'ptdtBubbleIn 0.4s cubic-bezier(.2,.8,.2,1) both';
    }
  }

  function hideBubble() {
    bubble.style.display = 'none';
  }
})();
</script>
